version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_PATH=/data/agentcheck.db
    env_file:
      - ./backend/.env
    volumes:
      - app-data:/data
    networks:
      - internal

  nginx:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - backend
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app-data:
  certbot-conf:
  certbot-www:

networks:
  internal:
