        <p>Check if AI agents like ChatGPT, Claude, Gemini, and Perplexity can find and recommend your website. Get an AI readiness score out of 100 with actionable fixes in 30 seconds — no signup required.</p>

        <p>AI agents are becoming the new search engines. When customers ask ChatGPT or Perplexity for recommendations, will your website show up? AgentCheck scans your site and tells you exactly what to fix to get discovered by AI.</p>
        <h2>What We Check — 18+ AI Readiness Signals</h2>
        <ul>
          <li><strong>AI Protocol Readiness:</strong> llms.txt, ai.txt, robots.txt AI directives, UCP endpoint detection</li>
          <li><strong>Structured Data Quality:</strong> Schema.org validation, JSON-LD completeness, rich snippet eligibility</li>
          <li><strong>Agent Accessibility:</strong> Response time (TTFB), JavaScript dependency, API availability, clean HTML</li>
          <li><strong>Conversion Readiness:</strong> CTAs, forms, booking systems, e-commerce actions for AI agents</li>
          <li><strong>Trust Signals:</strong> HTTPS, security headers, contact information, business verification</li>
        </ul>
